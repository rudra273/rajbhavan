<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#e07b39" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#e07b39" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="roofGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e07b39" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#e07b39" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e07b39" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#e07b39" stop-opacity="0.04"/>
    </linearGradient>
  </defs>

  <!-- Pure white background -->
  <rect width="500" height="500" fill="#ffffff"/>

  <!-- Subtle light circle backdrop -->
  <circle cx="250" cy="255" r="198" fill="#e07b39" opacity="0.04"/>
  <circle cx="250" cy="255" r="194" fill="none" stroke="#e07b39" stroke-width="0.8" opacity="0.15"/>



  <!-- === MAIN ROOF === -->
  <polygon points="250,118 100,252 400,252" fill="url(#roofGrad)" stroke="#e07b39" stroke-width="2" stroke-linejoin="round"/>

  <!-- Roof ridge tiles -->
  <line x1="148" y1="252" x2="190" y2="184" stroke="#e07b39" stroke-width="0.6" opacity="0.2"/>
  <line x1="196" y1="252" x2="228" y2="196" stroke="#e07b39" stroke-width="0.6" opacity="0.2"/>
  <line x1="250" y1="252" x2="250" y2="190" stroke="#e07b39" stroke-width="0.6" opacity="0.2"/>
  <line x1="304" y1="252" x2="272" y2="196" stroke="#e07b39" stroke-width="0.6" opacity="0.2"/>
  <line x1="352" y1="252" x2="310" y2="184" stroke="#e07b39" stroke-width="0.6" opacity="0.2"/>

  <!-- === CROWN / FINIAL === -->
  <line x1="250" y1="80" x2="250" y2="120" stroke="#e07b39" stroke-width="2" stroke-linecap="round"/>
  <rect x="240" y="106" width="20" height="14" rx="2" fill="#e07b39" opacity="0.5" stroke="#e07b39" stroke-width="1"/>
  <polygon points="240,106 243,96 246,106" fill="#e07b39" opacity="0.8"/>
  <polygon points="247,106 250,93 253,106" fill="#e07b39" opacity="1"/>
  <polygon points="254,106 257,96 260,106" fill="#e07b39" opacity="0.8"/>
  <circle cx="250" cy="91" r="3" fill="#f0a060"/>

  <!-- === TWIN CHIMNEYS === -->
  <rect x="172" y="172" width="14" height="44" rx="2" fill="#e07b39" opacity="0.45" stroke="#e07b39" stroke-width="1"/>
  <rect x="169" y="168" width="20" height="7" rx="1.5" fill="#e07b39" opacity="0.6"/>
  <rect x="314" y="172" width="14" height="44" rx="2" fill="#e07b39" opacity="0.45" stroke="#e07b39" stroke-width="1"/>
  <rect x="311" y="168" width="20" height="7" rx="1.5" fill="#e07b39" opacity="0.6"/>

  <!-- Smoke wisps -->
  <path d="M179,166 Q182,156 178,148 Q174,140 178,132" fill="none" stroke="#e07b39" stroke-width="1" stroke-linecap="round" opacity="0.25"/>
  <path d="M321,166 Q324,156 320,148 Q316,140 320,132" fill="none" stroke="#e07b39" stroke-width="1" stroke-linecap="round" opacity="0.25"/>

  <!-- === HOUSE BODY === -->
  <rect x="118" y="250" width="264" height="148" rx="3" fill="url(#bodyGrad)" stroke="#e07b39" stroke-width="1.8"/>
  <line x1="118" y1="308" x2="382" y2="308" stroke="#e07b39" stroke-width="0.7" opacity="0.2"/>

  <!-- === COLUMNS === -->
  <rect x="207" y="252" width="8" height="146" rx="2" fill="#e07b39" opacity="0.22"/>
  <rect x="285" y="252" width="8" height="146" rx="2" fill="#e07b39" opacity="0.22"/>
  <rect x="204" y="249" width="14" height="6" rx="1" fill="#e07b39" opacity="0.4"/>
  <rect x="282" y="249" width="14" height="6" rx="1" fill="#e07b39" opacity="0.4"/>
  <rect x="204" y="394" width="14" height="6" rx="1" fill="#e07b39" opacity="0.35"/>
  <rect x="282" y="394" width="14" height="6" rx="1" fill="#e07b39" opacity="0.35"/>

  <!-- === UPPER FLOOR WINDOWS === -->
  <rect x="134" y="262" width="46" height="36" rx="2" fill="#e07b39" opacity="0.13" stroke="#e07b39" stroke-width="1.2"/>
  <line x1="157" y1="262" x2="157" y2="298" stroke="#e07b39" stroke-width="0.9" opacity="0.4"/>
  <line x1="134" y1="280" x2="180" y2="280" stroke="#e07b39" stroke-width="0.9" opacity="0.4"/>
  <path d="M134,269 Q157,258 180,269" fill="#e07b39" opacity="0.12" stroke="#e07b39" stroke-width="0.8"/>

  <rect x="320" y="262" width="46" height="36" rx="2" fill="#e07b39" opacity="0.13" stroke="#e07b39" stroke-width="1.2"/>
  <line x1="343" y1="262" x2="343" y2="298" stroke="#e07b39" stroke-width="0.9" opacity="0.4"/>
  <line x1="320" y1="280" x2="366" y2="280" stroke="#e07b39" stroke-width="0.9" opacity="0.4"/>
  <path d="M320,269 Q343,258 366,269" fill="#e07b39" opacity="0.12" stroke="#e07b39" stroke-width="0.8"/>

  <!-- === LOWER FLOOR WINDOWS === -->
  <rect x="134" y="316" width="46" height="44" rx="2" fill="#e07b39" opacity="0.1" stroke="#e07b39" stroke-width="1.2"/>
  <line x1="157" y1="316" x2="157" y2="360" stroke="#e07b39" stroke-width="0.9" opacity="0.35"/>
  <line x1="134" y1="338" x2="180" y2="338" stroke="#e07b39" stroke-width="0.9" opacity="0.35"/>

  <rect x="320" y="316" width="46" height="44" rx="2" fill="#e07b39" opacity="0.1" stroke="#e07b39" stroke-width="1.2"/>
  <line x1="343" y1="316" x2="343" y2="360" stroke="#e07b39" stroke-width="0.9" opacity="0.35"/>
  <line x1="320" y1="338" x2="366" y2="338" stroke="#e07b39" stroke-width="0.9" opacity="0.35"/>

  <!-- === GRAND DOOR — starts from ground (y=398), goes up === -->
  <!-- Door arch top -->
  <path d="M222,290 Q250,268 278,290" fill="#e07b39" opacity="0.15" stroke="#e07b39" stroke-width="1.3"/>
  <!-- Left door panel -->
  <rect x="222" y="289" width="25" height="109" rx="2" fill="#e07b39" opacity="0.15" stroke="#e07b39" stroke-width="1.2"/>
  <!-- Right door panel -->
  <rect x="253" y="289" width="25" height="109" rx="2" fill="#e07b39" opacity="0.15" stroke="#e07b39" stroke-width="1.2"/>
  <!-- Door panel inset details -->
  <rect x="226" y="295" width="17" height="22" rx="1" fill="none" stroke="#e07b39" stroke-width="0.7" opacity="0.4"/>
  <rect x="226" y="324" width="17" height="22" rx="1" fill="none" stroke="#e07b39" stroke-width="0.7" opacity="0.4"/>
  <rect x="257" y="295" width="17" height="22" rx="1" fill="none" stroke="#e07b39" stroke-width="0.7" opacity="0.4"/>
  <rect x="257" y="324" width="17" height="22" rx="1" fill="none" stroke="#e07b39" stroke-width="0.7" opacity="0.4"/>
  <!-- Door knobs -->
  <circle cx="250" cy="350" r="2.8" fill="#f0a060" opacity="0.95"/>

  <!-- Door step -->
  <rect x="212" y="396" width="76" height="6" rx="1" fill="#e07b39" opacity="0.35"/>
  <rect x="206" y="400" width="88" height="4" rx="1" fill="#e07b39" opacity="0.2"/>

  <!-- === GROUND === -->
  <rect x="100" y="398" width="300" height="8" rx="4" fill="#e07b39" opacity="0.45"/>
  <rect x="110" y="406" width="280" height="3" rx="1.5" fill="#e07b39" opacity="0.2"/>
  <line x1="100" y1="395" x2="400" y2="395" stroke="#e07b39" stroke-width="0.5" opacity="0.18"/>

  <!-- Diamond ornament on peak -->
  <polygon points="250,118 254,124 250,130 246,124" fill="#f0a060" opacity="0.9"/>


</svg>